services:
 frontend:
  build: ./frontend
  platform: linux/amd64
  ports:
   - "80:80"
  depends_on:
   - backend

 backend:
  build: ./backend
  platform: linux/amd64
  ports:
   - "5000:5000"
  depends_on:
   - database

 database:
  image: mysql:8.0
  platform: linux/amd64
  environment:
   MYSQL_ROOT_PASSWORD: rootpassword
   MYSQL_DATABASE: ecommerce_db
  ports:
   - "3306:3306"
  volumes:
   - mysql_data:/var/lib/mysql

volumes:
 mysql_data:
