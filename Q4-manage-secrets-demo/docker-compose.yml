services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    secrets:
      - db_password
    depends_on:
      - database

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: securedb
    ports:
      - "3306:3306"
    secrets:
      - db_password

secrets:
  db_password:
    file: ./db_password.txt
